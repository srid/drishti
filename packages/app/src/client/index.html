<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- No static <title>: @solidjs/meta's reactive <Title> (App.tsx) owns it,
         so document.title is the single, correct `drishti@<host>` identity. A
         static <title> here would leave TWO <title> elements — @solidjs/meta
         appends rather than replaces — and the document.title getter would
         then report this stale one. kolu ships no static <title> for the same
         reason; the tab shows the URL for the brief pre-mount instant. -->
    <meta
      name="description"
      content="htop for your whole fleet — live processes, CPU, memory, and network over SSH, with nothing installed on the remote."
    />

    <!-- PWA: installable, offline-capable shell. The `theme-color` (address/
         status-bar tint) is NOT declared here: App.tsx drives it reactively via
         `@solidjs/meta` off the chosen theme, so it tracks the in-app light/dark
         toggle's override — a static media-query meta would only ever know the
         OS preference and disagree with the page once the toggle flips it. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="drishti" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <link rel="stylesheet" href="./styles.css" />
    <!-- Apply the saved (or OS-default) theme before first paint to avoid a
         flash of the wrong colours. Runs before any module loads, so it
         can't import theme.ts — the "drishti:theme" key must match THEME_KEY
         there. -->
    <script>
      try {
        var t = localStorage.getItem("drishti:theme");
        if (t !== "light" && t !== "dark")
          t = matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.dataset.theme = t;
      } catch (_) {
        /* storage blocked — fall through to CSS/OS default */
      }
    </script>
  </head>
  <body class="m-0 antialiased">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
